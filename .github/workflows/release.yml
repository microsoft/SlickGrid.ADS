name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (semver, e.g. 2.3.52)"
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          OLD_VERSION=""

          if git rev-parse -q --verify HEAD^ >/dev/null; then
            OLD_VERSION=$(git show HEAD^:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$NEW_VERSION" != "$OLD_VERSION" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Detected package.json version change: '$OLD_VERSION' -> '$NEW_VERSION'"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No package.json version change detected; skipping release."
          fi

      - name: Validate version
        if: steps.version.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version '$VERSION' is not valid semver."
            exit 1
          fi

      - name: Check existing tag
        if: steps.version.outputs.should_release == 'true'
        id: tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail manual run when tag exists
        if: steps.version.outputs.should_release == 'true' && github.event_name == 'workflow_dispatch' && steps.tag.outputs.exists == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Tag v$VERSION already exists."
          exit 1

      - name: Skip push run when tag already exists
        if: steps.version.outputs.should_release == 'true' && github.event_name == 'push' && steps.tag.outputs.exists == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: echo "Tag v$VERSION already exists; skipping duplicate release for push run."

      - name: Update package version
        if: steps.version.outputs.should_release == 'true' && github.event_name == 'workflow_dispatch' && steps.tag.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Commit, tag, and push (manual)
        if: steps.version.outputs.should_release == 'true' && github.event_name == 'workflow_dispatch' && steps.tag.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v$VERSION"

      - name: Create and push tag (push)
        if: steps.version.outputs.should_release == 'true' && github.event_name == 'push' && steps.tag.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Pack npm artifact
        if: steps.version.outputs.should_release == 'true' && steps.tag.outputs.exists != 'true'
        run: npm pack

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true' && steps.tag.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            *.tgz

      - name: No-op when release is not needed
        if: steps.version.outputs.should_release != 'true'
        run: echo "Release not required for this run."
